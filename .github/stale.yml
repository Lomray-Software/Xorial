staleLabel: stale

issues:
  daysUntilStale: 30
  daysUntilClose: 14
  exemptLabels:
    - pinned
    - security
    - roadmap
  staleLabel: stale
  markComment: >
    This issue has been inactive for 30 days. It will be closed in 14 days
    unless there is further activity. If this is still relevant, please
    leave a comment or remove the `stale` label.
  closeComment: >
    Closing due to inactivity. If this is still relevant, feel free to reopen
    with updated context.

pulls:
  daysUntilStale: 45
  daysUntilClose: 14
  exemptLabels:
    - pinned
    - work-in-progress
  staleLabel: stale
  markComment: >
    This pull request has been inactive for 45 days. It will be closed in 14
    days unless there is further activity. Please rebase and update if you'd
    like this merged.
  closeComment: >
    Closing due to inactivity. Feel free to reopen when ready.
